version: "3.9"

x-service-env: &service-env
  EUREKA_URL: http://discovery-server:8761/eureka
  KAFKA_BOOTSTRAP: kafka:9092
  REDIS_HOST: redis
  MYSQL_HOST: mysql
  MYSQL_USER: exchange
  MYSQL_PASSWORD: exchange123
  JWT_SECRET: change-me-this-is-a-dev-only-secret-key-32bytes!

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: exchange
      MYSQL_PASSWORD: exchange123
      MYSQL_DATABASE: exchange_users
    ports: ["3307:3306"]
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0          # KRaft mode, no ZooKeeper
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      retries: 12

  discovery-server:
    build: { context: ., args: { SERVICE: discovery-server } }
    ports: ["8761:8761"]

  api-gateway:
    build: { context: ., args: { SERVICE: api-gateway } }
    environment: *service-env
    ports: ["8080:8080"]
    depends_on: [discovery-server, redis]

  user-service:
    build: { context: ., args: { SERVICE: user-service } }
    environment: *service-env
    depends_on:
      mysql: { condition: service_healthy }
      discovery-server: { condition: service_started }

  order-service:
    build: { context: ., args: { SERVICE: order-service } }
    environment: *service-env
    depends_on:
      mysql: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }

  matching-engine-service:
    build: { context: ., args: { SERVICE: matching-engine-service } }
    environment:
      <<: *service-env
      JAVA_OPTS: "-Xms512m -Xmx1g -XX:+UseZGC"   # low-pause GC for the latency-sensitive engine
    depends_on:
      kafka: { condition: service_healthy }

  portfolio-service:
    build: { context: ., args: { SERVICE: portfolio-service } }
    environment: *service-env
    depends_on:
      mysql: { condition: service_healthy }
      kafka: { condition: service_healthy }

  market-data-service:
    build: { context: ., args: { SERVICE: market-data-service } }
    environment: *service-env
    ports: ["8085:8085"]
    depends_on:
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  mysql-data:
